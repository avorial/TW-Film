<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#141414"/>

  <!-- Amber film strip band -->
  <rect x="3" y="9" width="26" height="14" fill="#e8b84b"/>

  <!-- Top and bottom band borders (slightly darker amber) -->
  <rect x="3" y="9"  width="26" height="1.2" fill="#c8983a"/>
  <rect x="3" y="21.8" width="26" height="1.2" fill="#c8983a"/>

  <!-- Sprocket holes — top row (3 holes) -->
  <rect x="5.5"  y="5.5" width="3.5" height="3.5" rx="0.5" fill="#141414"/>
  <rect x="14.2" y="5.5" width="3.5" height="3.5" rx="0.5" fill="#141414"/>
  <rect x="23"   y="5.5" width="3.5" height="3.5" rx="0.5" fill="#141414"/>

  <!-- Sprocket holes — bottom row (3 holes) -->
  <rect x="5.5"  y="23" width="3.5" height="3.5" rx="0.5" fill="#141414"/>
  <rect x="14.2" y="23" width="3.5" height="3.5" rx="0.5" fill="#141414"/>
  <rect x="23"   y="23" width="3.5" height="3.5" rx="0.5" fill="#141414"/>

  <!-- Film frames — three dark windows inside the strip -->
  <rect x="5"    y="11.5" width="6.5" height="9" rx="0.5" fill="#0a0a0a"/>
  <rect x="12.8" y="11.5" width="6.5" height="9" rx="0.5" fill="#0a0a0a"/>
  <rect x="20.5" y="11.5" width="6.5" height="9" rx="0.5" fill="#0a0a0a"/>
</svg>
